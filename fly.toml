app = "bet-mvp"
primary_region = "nrt"

[build]

[env]
  DATABASE_PATH = "/data/bet.db"
  SESSION_COOKIE_SECURE = "1"
  PORT = "8080"

[[mounts]]
  source = "bet_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
